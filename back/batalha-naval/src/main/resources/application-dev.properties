# Perfil de desenvolvimento — ative com: spring.profiles.active=dev
# Usa H2 in-memory para não precisar de PostgreSQL local

spring.datasource.url=jdbc:h2:mem:batalha_naval;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

# JWT secret para desenvolvimento (NÃO usar em produção)
jwt.secret=dev-only-secret-key-not-for-production-use-change-me-12345

# CORS liberal em dev
cors.allowed-origins=http://localhost:5173,http://localhost:3000
