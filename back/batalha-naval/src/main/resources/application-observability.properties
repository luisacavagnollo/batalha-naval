# Profile de observabilidade - ativar com: --spring.profiles.active=dev,observability

# Actuator - expor todos em observabilidade
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers
management.endpoint.health.show-details=always

# OpenTelemetry
otel.service.name=${spring.application.name}
otel.exporter.otlp.endpoint=http://jaeger:4317
otel.exporter.otlp.protocol=grpc
otel.traces.exporter=otlp
otel.metrics.exporter=none
otel.logs.exporter=none

# Metricas detalhadas
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles.http.server.requests=0.5,0.95,0.99
management.metrics.distribution.slo.http.server.requests=50ms,100ms,200ms,500ms,1s,5s
