spring.application.name=batalha-naval
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
server.port=${PORT:8080}

# PostgreSQL Database — credenciais via variáveis de ambiente (OBRIGATÓRIAS em produção)
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:batalha_naval}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT — secret OBRIGATÓRIO via variável de ambiente em produção
# Em dev, o application-dev.properties define um valor local
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# CORS — domínio do frontend (ex: https://batalha-naval-front.vercel.app)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}


# ===== Actuator =====
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=${spring.application.name}

# ===== Slow SQL logging =====
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=500
logging.level.org.hibernate.SQL_SLOW=WARN