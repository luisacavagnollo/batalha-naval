spring.application.name=batalha-naval
server.port=8080

# H2 Database (file-based - dados persistem entre restarts)
spring.datasource.url=jdbc:h2:file:./data/battleship;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true

# JWT
jwt.secret=${JWT_SECRET:batalha-naval-secret-key-that-is-long-enough-for-hs256-algorithm}
jwt.expiration=86400000
